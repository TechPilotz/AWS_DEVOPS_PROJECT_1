version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version
      # Modern ECR login command (The $(aws ecr get-login) is deprecated)
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 675493408531.dkr.ecr.ap-south-1.amazonaws.com
      # Setting variables for Mumbai Region and your Repository
      - REPOSITORY_URI=675493408531.dkr.ecr.ap-south-1.amazonaws.com/my-aws-ecs-docker_images
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Writing definitions file...
      # CRITICAL: "name" must match the Container Name in your Task Definition
      - printf '[{"name":"exp-code-pipeline","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
